# Neo-MiniMax-TTS 插件配置模板
# 复制此文件到 config/plugins/neo_minimax_tts/config.toml 并填入你的配置

[minimax]
# MiniMax API Key（必填）
# 从 https://platform.minimaxi.com/ 获取
api_key = ""

# TTS 模型名称（可选）
# 可选值: speech-2.8-hd, speech-2.8-turbo
model = "speech-2.8-hd"

# 默认语音 ID（可选）
# 支持 MiniMax 预设音色或声音克隆后的音色
# 预设音色:
#   - female-tianmei: 女声 - 甜美
#   - female-yujie: 女声 - 御姐
#   - female-chengshu: 女声 - 成熟
#   - male-qn-qingse: 男声 - 青涩
#   - male-qn-jingying: 男声 - 精英
#   - male-qn-badao: 男声 - 霸道
# 克隆音色: 使用你上传音频后获得的 voice_id，如 neo_cian2
voice_id = "female-tianmei"

# 语速（可选）
# 范围: 0.5 - 2.0，1.0 为正常语速
speed = 1.0

# 音量（可选）
# 范围: 0.1 - 1.0，1.0 为正常音量
volume = 1.0

[output]
# 音频文件保存目录（可选）
audio_dir = "data/neo_minimax_tts/audio"

# 音频格式（可选）
# 可选值: mp3, wav, aac
audio_format = "mp3"

# 单次转换最大文本长度（可选）
max_text_length = 500

[behavior]
# 发送后是否自动删除本地音频文件（可选）
auto_delete = false

# 是否以语音消息形式发送（可选）
# true: 以语音消息形式发送
# false: 以文件形式发送
send_as_record = true

[plugin]
# 是否注入系统提示词（可选）
# true: 告知 LLM 使用语音功能，LLM 会在合适时机主动调用
# false: 不注入，需要用户明确要求才会使用
inject_system_prompt = true
